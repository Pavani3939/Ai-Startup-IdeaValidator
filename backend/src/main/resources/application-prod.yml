spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:startup_validator}?useSSL=true&requireSSL=false&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

gemini:
  api:
    key: ${GEMINI_API_KEY:your-default-api-key-if-not-set-in-env}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent
